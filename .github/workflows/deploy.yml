name: Deploy Platform to AWS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy All Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Compose & Config to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/home/ubuntu/tamkeen"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/tamkeen
            
            # Make sure .env is created and updated correctly from repository
            if [ ! -f .env ]; then
              cp ../.env.example .env 2>/dev/null || echo "No .env created yet"
            fi

            # Pull all latest images
            sudo docker compose pull || sudo docker-compose pull

            # Deploy with zero-downtime
            sudo docker compose up -d --remove-orphans || sudo docker-compose up -d --remove-orphans

            # Health checks
            sleep 20
            echo "=== Platform Health Check ==="
            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            
            curl -sf http://localhost:3000/health > /dev/null && echo "Backend:    ✅" || echo "Backend:    ❌"
            curl -sf http://localhost:8000/ > /dev/null      && echo "AI Tracker: ✅" || echo "AI Tracker: ❌"
            curl -sf http://localhost:80 > /dev/null         && echo "Frontend:   ✅" || echo "Frontend:   ❌"
