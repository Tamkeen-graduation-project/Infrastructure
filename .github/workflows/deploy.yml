name: Deploy Platform to AWS

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy All Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Compose & Config to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/home/ubuntu/tamkeen"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/tamkeen

            # Make sure .env exists
            if [ ! -f .env ]; then
              cp ../.env.example .env 2>/dev/null || echo "No .env created yet"
            fi

            # Ensure EBS directories exist
            sudo mkdir -p /data/redis /data/logs /data/qdrant /data/letsencrypt

            # Pull all latest images
            sudo docker compose pull || sudo docker-compose pull

            # Deploy with zero-downtime
            sudo docker compose up -d --remove-orphans || sudo docker-compose up -d --remove-orphans

            # Health checks with retries
            echo "=== Waiting for services to start ==="
            sleep 30

            echo "=== Platform Health Check ==="
            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            FAILED=0

            # Backend
            for i in $(seq 1 6); do
              curl -sf http://localhost:3000/api/v1/ping > /dev/null 2>&1 && echo "Backend:           ✅" && break
              [ $i -eq 6 ] && FAILED=1 && echo "Backend:           ❌"
              sleep 5
            done

            # Frontend (via nginx)
            for i in $(seq 1 6); do
              curl -sf http://localhost:80 > /dev/null 2>&1 && echo "Frontend:          ✅" && break
              [ $i -eq 6 ] && FAILED=1 && echo "Frontend:          ❌"
              sleep 5
            done

            if [ $FAILED -eq 1 ]; then
              echo ""
              echo "⚠️  Some services failed health checks. Check logs with: sudo docker compose logs <service>"
              exit 1
            fi

            echo ""
            echo "🎉 All services deployed successfully!"
