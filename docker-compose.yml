services:
  database:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: Tamkeen_Backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - app_net

  backend:
    image: tamkeengraduationproject/tamkeen-backend:${BACKEND_VERSION:-latest}
    container_name: tamkeen_api
    restart: always
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/src/logs
    networks:
      - app_net

  ai_tracking:
    image: tamkeengraduationproject/tamkeen-ai-tracker:${AI_TRACKER_VERSION:-latest}
    container_name: ai_tracking
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - app_net

  ai_recommendation:
    image: tamkeengraduationproject/tamkeen-ai-recommendation-engine:${AI_RECOMMENDATION_VERSION:-latest}
    container_name: ai_recommendation
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      - app_net

  ai_skill:
    image: tamkeengraduationproject/tamkeen-ai-skill-assessment:${AI_SKILL_VERSION:-latest}
    container_name: ai_skill
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "8002:8002"
    networks:
      - app_net

  frontend:
    image: tamkeengraduationproject/tamkeen-frontend:${FRONTEND_VERSION:-latest}
    container_name: tamkeen_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app_net

  nginx:
    image: jonasal/nginx-certbot:latest
    container_name: nginx_proxy
    restart: always
    environment:
      - CERTBOT_EMAIL=abdullahsakr125@gmail.com
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/user_conf.d
      - letsencrypt_data:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:

networks:
  app_net:
    driver: bridge
