services:
  database:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=Production_Tamkeen_Database
    volumes:
      - postgres_data:/var/lib/postgresql/data # <-- EBS storage!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - /data/redis:/data # <-- EBS storage!
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - app_net

  backend:
    image: tamkeengraduationproject/tamkeen-backend:${BACKEND_VERSION:-latest}
    container_name: tamkeen_api
    restart: always
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - /data/logs:/app/src/logs # <-- EBS storage!
    networks:
      - app_net
    command: >
      sh -c "
        npm run prisma:generate &&
        npx prisma migrate deploy &&
        npx prisma db seed &&
        node dist/src/server.js
      "

  test:
    image: tamkeengraduationproject/tamkeen-backend:${BACKEND_VERSION:-latest}
    container_name: tamkeen_test
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DATABASE_TEST_PASSWORD}@database:5432/Test_Tamkeen_Database?schema=public
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - ACCESS_TOKEN_LIFETIME=${ACCESS_TOKEN_LIFETIME}
      - REFRESH_TOKEN_LIFETIME=${REFRESH_TOKEN_LIFETIME}
      - APP_PASSWORD=${APP_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - NODE_ENV=test
      - API_PREFIX=/api/v1
      - CLIENT_URL=${CLIENT_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - TRACKING_API_KEY=${TRACKING_API_KEY}
      - AI_WEBHOOK_SECRET=${AI_WEBHOOK_SECRET}
      - TRACKING_URL=http://tracking:8000
      - AI_API_URL=http://tamkeen-recommendation-api:8001
      - RECOMMENDATION_API_KEY=${RECOMMENDATION_API_KEY}
      - RECOMMENDATION_API_URL_DEV=${RECOMMENDATION_API_URL_DEV}
      - RECOMMENDATION_API_URL_PROD=${RECOMMENDATION_API_URL_PROD}
    env_file:
      - .env
    networks:
      - app_net
    command: >
      sh -c "
        npm install &&
        npm run prisma:generate &&
        npx prisma migrate deploy &&
        npx prisma db seed &&
        npx jest --runInBand
      "

  ai_tracking:
    image: tamkeengraduationproject/tamkeen-ai-tracker:${AI_TRACKER_VERSION:-latest}
    container_name: ai_tracking
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - app_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tamkeen-qdrant
    restart: unless-stopped
    volumes:
      - /data/qdrant:/qdrant/storage # <-- EBS storage!
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai_recommendation:
    image: tamkeengraduationproject/tamkeen-ai-recommendation-engine:${AI_RECOMMENDATION_VERSION:-latest}
    container_name: tamkeen-recommendation-api
    restart: always
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_net

  # ── AI Chatbot ──
  ai_chatbot:
    image: tamkeengraduationproject/tamkeen-ai-chatbot:${AI_CHATBOT_VERSION:-latest}
    container_name: tamkeen-chatbot
    restart: always
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app_net

  frontend:
    image: tamkeengraduationproject/tamkeen-frontend:${FRONTEND_VERSION:-latest}
    container_name: tamkeen_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app_net

  nginx:
    image: jonasal/nginx-certbot:latest
    container_name: nginx_proxy
    restart: always
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/user_conf.d
      - /data/letsencrypt:/etc/letsencrypt # <-- EBS storage!
    depends_on:
      - backend
      - frontend
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
